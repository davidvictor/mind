name: Public Safety

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  private-data-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check tracked files for private data
        run: python core/tools/check_no_private_data.py --tracked
