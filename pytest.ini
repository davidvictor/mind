[pytest]
testpaths = tests
pythonpath =
    core
norecursedirs = .* __pycache__ .venv .pytest_cache
addopts = --strict-markers
markers =
    contract: contract tests for CLI/docs/wrapper surfaces.
    golden: fixture-backed golden projection tests.
    integration: cross-module scenario tests.
    readiness: copied-harness rehearsal coverage.
    slow: broader scenarios that are materially slower than the unit/default path.
